<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GG Software</title>
    <link rel="canonical" href="https://ggsoftware.cz/cs" />
    <meta http-equiv="refresh" content="0; url=/cs" />
    <script>
      (function () {
        var supported = ['cs', 'en'];
        var fallback = 'cs';
        var lang = (navigator.language || navigator.userLanguage || fallback)
          .slice(0, 2)
          .toLowerCase();
        var target = supported.indexOf(lang) !== -1 ? lang : fallback;
        window.location.replace('/' + target);
      })();
    </script>
  </head>
  <body>
    <p>Redirecting to <a href="/cs">ggsoftware.cz</a>…</p>
  </body>
</html>
